# =============================================================================
# llm-agent.conf — Nginx reverse proxy for the Mac Mini LLM agent
#
# Installed to $(brew --prefix)/etc/nginx/servers/llm-agent.conf by
# scripts/setup_nginx.sh, which substitutes __WG_IP__ with the actual
# WireGuard interface IP (e.g. 10.8.0.1).
#
# Security design
# ───────────────
# • listen directive uses the WireGuard IP only — the port is invisible from
#   the local LAN and from the internet.
# • Rate limiting (10 r/s general, 2 r/s for streaming inference) prevents a
#   single misbehaving VPN client from monopolising the GPU.
# • Security response headers (X-Frame-Options, CSP, HSTS-ready) defend users
#   of the Open WebUI against common web attacks.
# • Proxy buffers are sized for LLM streaming (chunked transfer encoding).
#
# Routing
# ───────
# /api/  →  Ollama REST API  (http://127.0.0.1:11434)
# /      →  Open WebUI       (http://127.0.0.1:3000)
# =============================================================================

# ── Rate-limit zones ────────────────────────────────────────────────────────
# General zone: 10 requests/second per client IP, burst of 20
limit_req_zone $binary_remote_addr zone=llm_general:10m rate=10r/s;

# Inference zone: 2 requests/second for /api/generate and /api/chat
# (streaming responses can be long; this prevents queue saturation)
limit_req_zone $binary_remote_addr zone=llm_inference:10m rate=2r/s;

# ── Upstream backends ────────────────────────────────────────────────────────
upstream ollama_backend {
  server 127.0.0.1:11434;
  keepalive 8;
}

upstream openwebui_backend {
  server 127.0.0.1:3000;
  keepalive 8;
}

# ── Server block ────────────────────────────────────────────────────────────
server {
  # Listen ONLY on the WireGuard interface — __WG_IP__ is substituted at
  # install time by scripts/setup_nginx.sh
  listen __WG_IP__:8080;
  server_name _;

  # ── Security headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options           "SAMEORIGIN"           always;
  add_header X-Content-Type-Options    "nosniff"              always;
  add_header X-XSS-Protection          "1; mode=block"        always;
  add_header Referrer-Policy           "strict-origin"        always;
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; \
style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; \
font-src 'self' data:; connect-src 'self' ws: wss:;"         always;

  # Remove server version banner
  server_tokens off;

  # ── Timeouts (generous for long inference runs) ──────────────────────────
  proxy_read_timeout  600s;
  proxy_send_timeout  600s;
  send_timeout        600s;

  # ── Proxy common settings ─────────────────────────────────────────────────
  proxy_http_version 1.1;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   Connection        "";

  # Disable response buffering so streaming tokens reach the client immediately
  proxy_buffering    off;

  # ── /api/ — Ollama REST API ───────────────────────────────────────────────
  location /api/ {
    # Tighter rate limit for inference endpoints
    limit_req zone=llm_inference burst=5 nodelay;
    limit_req_status 429;

    # Strip the /api prefix before forwarding to Ollama
    # Ollama's own root is / so /api/generate → /api/generate on the backend
    # (Ollama already uses /api/* paths, so we just proxy as-is)
    proxy_pass http://ollama_backend/api/;
  }

  # ── / — Open WebUI ───────────────────────────────────────────────────────
  location / {
    limit_req zone=llm_general burst=20 nodelay;
    limit_req_status 429;

    proxy_pass http://openwebui_backend/;

    # WebSocket support (Open WebUI uses WebSockets for streaming chat)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # ── Error pages ──────────────────────────────────────────────────────────
  error_page 429 @rate_limited;
  location @rate_limited {
    default_type application/json;
    return 429 '{"error":"rate limit exceeded — slow down"}';
  }

  error_page 502 503 504 @upstream_error;
  location @upstream_error {
    default_type application/json;
    return 502 '{"error":"LLM service unavailable — check Mac Mini services"}';
  }
}
